{% extends 'base.html' %}
{% load i18n %}
{% block title %}{% trans "Forgot password" %} — {{ BRAND_NAME }}{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1>{% trans "Forgot your password?" %}</h1>
    <p class="lede">{% trans "We'll email you a 6-digit reset code." %}</p>
    <form method="post">
      {% csrf_token %}
      <div class="field">
        <label for="id_email">{% trans "Email" %}</label>
        <input id="id_email" name="email" type="email" required />
      </div>
      <button class="btn-cta" type="submit" style="width:100%;">{% trans "Send reset code" %}</button>
    </form>
    <p class="auth-meta"><a href="{% url 'accounts:login' %}">{% trans "Back to sign in" %}</a></p>
  </div>
</div>
{% endblock %}
